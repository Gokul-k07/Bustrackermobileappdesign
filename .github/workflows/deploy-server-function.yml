name: Deploy Server Function

on:
  push:
    branches:
      - main
    paths:
      - src/supabase/functions/server/**
      - scripts/smoke-functions.ps1
      - .github/workflows/deploy-server-function.yml
  workflow_dispatch:

jobs:
  deploy-server:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Validate required secrets
        run: |
          if [ -z "${SUPABASE_ACCESS_TOKEN}" ]; then
            echo "SUPABASE_ACCESS_TOKEN is not set"
            exit 1
          fi
          if [ -z "${SUPABASE_PROJECT_REF}" ]; then
            echo "SUPABASE_PROJECT_REF is not set"
            exit 1
          fi

      - name: Deploy server function (no gateway JWT verification)
        run: supabase functions deploy server --project-ref "${SUPABASE_PROJECT_REF}" --workdir src --use-api --no-verify-jwt

      - name: Smoke test deployed function
        shell: pwsh
        run: ./scripts/smoke-functions.ps1 -ProjectRef "${env:SUPABASE_PROJECT_REF}" -FunctionSlug "server"
